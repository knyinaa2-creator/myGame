<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스네이크 게임</title>
    <!-- Tailwind CSS (가정된 환경에 맞추어 CDN 포함) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 모바일에서 터치 시 하이라이트 제거 및 드래그 방지 */
        body {
            -webkit-tap-highlight-color: transparent;
            touch-action: none; /* 화면 스크롤 방지 */
        }
        
        /* 캔버스 렌더링 최적화 */
        canvas {
            image-rendering: pixelated;
        }

        /* 깜빡임 애니메이션 (게임 오버 시) */
        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .flash {
            animation: flash 1s infinite;
        }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen w-screen flex flex-col items-center justify-center overflow-hidden font-sans">

    <!-- 메인 컨테이너 -->
    <div class="w-full max-w-lg p-4 flex flex-col items-center gap-4">
        
        <!-- 헤더 / 점수판 -->
        <div class="w-full flex justify-between items-end px-2">
            <div>
                <h1 class="text-3xl font-bold text-green-400 drop-shadow-md">스네이크</h1>
                <p class="text-gray-400 text-sm">고전 꼬리잡기 게임</p>
            </div>
            <div class="text-right bg-gray-800 py-2 px-4 rounded-xl border border-gray-700 shadow-inner">
                <div class="text-xs text-gray-400 uppercase tracking-wider">점수</div>
                <div class="text-2xl font-mono font-bold text-white" id="scoreDisplay">0</div>
            </div>
        </div>

        <!-- 게임 화면 (캔버스 컨테이너) -->
        <div class="relative w-full aspect-square bg-black rounded-xl border-4 border-gray-700 shadow-2xl overflow-hidden">
            <canvas id="gameCanvas" class="w-full h-full block"></canvas>
            
            <!-- 오버레이 UI (시작 / 게임오버) -->
            <div id="overlay" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-10 transition-opacity duration-300">
                <h2 id="overlayTitle" class="text-4xl font-bold text-white mb-2">준비되셨나요?</h2>
                <p id="overlayDesc" class="text-gray-300 mb-8 text-center px-4">
                    <span class="hidden md:inline">방향키를 사용하여 뱀을 움직이세요.<br></span>
                    <span class="md:hidden">화면을 스와이프하거나 아래 버튼으로 움직이세요.<br></span>
                    벽이나 자기 몸에 부딪히면 안 됩니다!
                </p>
                <button id="startBtn" class="bg-green-500 hover:bg-green-400 text-gray-900 font-bold py-3 px-8 rounded-full text-xl shadow-[0_0_15px_rgba(34,197,94,0.5)] transition-all transform hover:scale-105 active:scale-95">
                    게임 시작
                </button>
            </div>
        </div>

        <!-- 모바일 터치 컨트롤 패드 (모바일에서만 표시) -->
        <div class="grid grid-cols-3 gap-2 mt-2 md:hidden w-48 h-48 opacity-80">
            <div></div>
            <button id="btnUp" class="bg-gray-800 border-2 border-gray-700 rounded-xl flex items-center justify-center active:bg-gray-600 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" /></svg>
            </button>
            <div></div>
            <button id="btnLeft" class="bg-gray-800 border-2 border-gray-700 rounded-xl flex items-center justify-center active:bg-gray-600 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
            </button>
            <button id="btnDown" class="bg-gray-800 border-2 border-gray-700 rounded-xl flex items-center justify-center active:bg-gray-600 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
            </button>
            <button id="btnRight" class="bg-gray-800 border-2 border-gray-700 rounded-xl flex items-center justify-center active:bg-gray-600 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
            </button>
        </div>

    </div>

    <script>
        // DOM 요소
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayDesc = document.getElementById('overlayDesc');
        const startBtn = document.getElementById('startBtn');

        // 게임 설정 (논리적 그리드 크기)
        const gridSize = 20; 
        const tileCount = 20; 
        canvas.width = 400; // 내부 렌더링 해상도
        canvas.height = 400;
        const tileSize = canvas.width / tileCount;

        // 게임 상태 변수
        let snake = [];
        let apple = { x: 0, y: 0 };
        let velocity = { x: 0, y: 0 };
        let nextVelocity = { x: 0, y: 0 }; // 빠른 키 입력 대응
        let score = 0;
        let gameLoop = null;
        let isPlaying = false;
        let isPaused = false;
        let speed = 120; // 초기 속도 (ms)

        // 초기화 함수
        function initGame() {
            snake = [
                { x: 10, y: 10 }, // 머리
                { x: 10, y: 11 }, // 몸통
                { x: 10, y: 12 }  // 꼬리
            ];
            velocity = { x: 0, y: -1 }; // 위로 시작
            nextVelocity = { x: 0, y: -1 };
            score = 0;
            speed = 130;
            isPaused = false;
            scoreDisplay.innerText = score;
            placeApple();
        }

        // 사과 무작위 배치
        function placeApple() {
            let valid = false;
            while (!valid) {
                apple.x = Math.floor(Math.random() * tileCount);
                apple.y = Math.floor(Math.random() * tileCount);
                valid = true;
                // 사과가 뱀 몸통 위에 생성되지 않도록 체크
                for (let part of snake) {
                    if (part.x === apple.x && part.y === apple.y) {
                        valid = false;
                        break;
                    }
                }
            }
        }

        // 게임 메인 루프
        function update() {
            // 진행 방향 업데이트 (바로 반대 방향으로 꺾는 것 방지)
            velocity = { ...nextVelocity };

            // 머리 다음 위치 계산
            const head = { 
                x: snake[0].x + velocity.x, 
                y: snake[0].y + velocity.y 
            };

            // 1. 벽 충돌 검사
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 2. 자기 몸 충돌 검사
            for (let part of snake) {
                if (part.x === head.x && part.y === head.y) {
                    gameOver();
                    return;
                }
            }

            // 머리 이동
            snake.unshift(head);

            // 3. 사과 먹었는지 검사
            if (head.x === apple.x && head.y === apple.y) {
                score += 10;
                scoreDisplay.innerText = score;
                placeApple();
                
                // 속도 점진적 증가
                if (speed > 60) {
                    speed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, speed);
                }
            } else {
                // 사과를 안 먹었으면 꼬리를 자름 (이동 효과)
                snake.pop();
            }

            draw();
        }

        // 화면 그리기
        function draw() {
            // 배경 지우기
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 그리드 그리기 (선택사항, 레트로 느낌)
            ctx.strokeStyle = '#1f2937'; // gray-800
            ctx.lineWidth = 1;
            for(let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * tileSize, 0);
                ctx.lineTo(i * tileSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * tileSize);
                ctx.lineTo(canvas.width, i * tileSize);
                ctx.stroke();
            }

            // 뱀 그리기
            snake.forEach((part, index) => {
                // 머리는 더 밝은 녹색, 몸통은 일반 녹색
                ctx.fillStyle = index === 0 ? '#4ade80' : '#22c55e';
                
                // 타일보다 살짝 작게 그려서 블록 구분감 주기
                const margin = 1;
                ctx.fillRect(
                    part.x * tileSize + margin, 
                    part.y * tileSize + margin, 
                    tileSize - margin * 2, 
                    tileSize - margin * 2
                );

                // 눈 그리기 (머리에만)
                if (index === 0) {
                    ctx.fillStyle = '#000';
                    let eyeOffset1 = {x: 0, y: 0};
                    let eyeOffset2 = {x: 0, y: 0};
                    
                    if(velocity.x === 1) { // Right
                        eyeOffset1 = {x: 12, y: 4}; eyeOffset2 = {x: 12, y: 12};
                    } else if(velocity.x === -1) { // Left
                        eyeOffset1 = {x: 4, y: 4}; eyeOffset2 = {x: 4, y: 12};
                    } else if(velocity.y === -1) { // Up
                        eyeOffset1 = {x: 4, y: 4}; eyeOffset2 = {x: 12, y: 4};
                    } else if(velocity.y === 1) { // Down
                        eyeOffset1 = {x: 4, y: 12}; eyeOffset2 = {x: 12, y: 12};
                    } else {
                        eyeOffset1 = {x: 4, y: 4}; eyeOffset2 = {x: 12, y: 4};
                    }

                    ctx.fillRect(part.x * tileSize + eyeOffset1.x, part.y * tileSize + eyeOffset1.y, 4, 4);
                    ctx.fillRect(part.x * tileSize + eyeOffset2.x, part.y * tileSize + eyeOffset2.y, 4, 4);
                }
            });

            // 사과 그리기
            ctx.fillStyle = '#ef4444'; // red-500
            ctx.beginPath();
            const radius = tileSize / 2 - 2;
            const centerX = apple.x * tileSize + tileSize / 2;
            const centerY = apple.y * tileSize + tileSize / 2;
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();
            
            // 사과 하이라이트 (입체감)
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.beginPath();
            ctx.arc(centerX - 3, centerY - 3, radius / 3, 0, Math.PI * 2);
            ctx.fill();
        }

        // 게임 오버 처리
        function gameOver() {
            isPlaying = false;
            isPaused = false;
            clearInterval(gameLoop);
            overlayTitle.innerText = "게임 오버!";
            overlayTitle.classList.add('text-red-500', 'flash');
            overlayDesc.innerHTML = `최종 점수: <strong class="text-white text-xl">${score}</strong><br>다시 도전하시겠습니까?`;
            startBtn.innerText = "다시 시작";
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.style.opacity = '1';
            }, 10);
        }

        // 게임 시작
        function startGame() {
            initGame();
            draw();
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlayTitle.classList.remove('text-red-500', 'flash');
                isPlaying = true;
                gameLoop = setInterval(update, speed);
            }, 300);
        }

        // --- 컨트롤 (입력) 처리 ---

        // 일시 정지 토글
        function togglePause() {
            if (!isPlaying) return; // 게임 중이 아닐 때는 무시

            isPaused = !isPaused;
            
            if (isPaused) {
                clearInterval(gameLoop);
                
                // 화면에 일시 정지 텍스트 표시
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'; // 반투명 배경
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 30px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('일시 정지', canvas.width / 2, canvas.height / 2);
                
                ctx.font = '16px sans-serif';
                ctx.fillStyle = '#aaaaaa';
                ctx.fillText('스페이스바를 눌러 계속하기', canvas.width / 2, canvas.height / 2 + 40);
            } else {
                gameLoop = setInterval(update, speed);
            }
        }

        // 방향 전환 로직 (현재 진행 반대 방향 입력 방지)
        function changeDirection(newX, newY) {
            if (!isPlaying || isPaused) return;
            if (velocity.x !== 0 && newX !== 0) return; // 좌우 이동 중 좌우 입력 무시
            if (velocity.y !== 0 && newY !== 0) return; // 상하 이동 중 상하 입력 무시
            nextVelocity = { x: newX, y: newY };
        }

        // 1. 키보드 입력
        window.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault(); // 스페이스바 스크롤 방지
                togglePause();
                return;
            }
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': changeDirection(0, -1); break;
                case 'ArrowDown': case 's': case 'S': changeDirection(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': changeDirection(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': changeDirection(1, 0); break;
            }
        });

        // 2. 화면 스와이프 입력 (모바일)
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: false});

        canvas.addEventListener('touchmove', e => {
            e.preventDefault(); // 스크롤 방지
        }, {passive: false});

        canvas.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, {passive: false});

        function handleSwipe(startX, startY, endX, endY) {
            const diffX = endX - startX;
            const diffY = endY - startY;
            
            // 스와이프 민감도 임계값
            if (Math.abs(diffX) < 30 && Math.abs(diffY) < 30) return;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                // 좌우 스와이프
                if (diffX > 0) changeDirection(1, 0);
                else changeDirection(-1, 0);
            } else {
                // 상하 스와이프
                if (diffY > 0) changeDirection(0, 1);
                else changeDirection(0, -1);
            }
        }

        // 3. 온스크린 버튼 (모바일)
        document.getElementById('btnUp').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(0, -1); });
        document.getElementById('btnDown').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(0, 1); });
        document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(-1, 0); });
        document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(1, 0); });
        
        // PC 마우스 클릭 지원
        document.getElementById('btnUp').addEventListener('mousedown', () => changeDirection(0, -1));
        document.getElementById('btnDown').addEventListener('mousedown', () => changeDirection(0, 1));
        document.getElementById('btnLeft').addEventListener('mousedown', () => changeDirection(-1, 0));
        document.getElementById('btnRight').addEventListener('mousedown', () => changeDirection(1, 0));

        // 버튼 이벤트 바인딩
        startBtn.addEventListener('click', startGame);

        // 초기 렌더링 세팅
        initGame();
        draw();

    </script>
</body>
<!-- 좌측 탭 네비게이션 스타일 -->
